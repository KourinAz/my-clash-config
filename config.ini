[custom]

;==============================
; 策略组
;==============================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT

;==============================
; 规则
;==============================

ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list

ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list

ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

enable_rule_generator=true
overwrite_original_rules=true

;==============================
; Emoji 设置
;==============================

add_emoji=true
remove_old_emoji=true

;==============================
; 删除已有 emoji（防止双国旗）
;==============================

rename_node=(🇭🇰|🇹🇼|🇯🇵|🇰🇷|🇺🇸|🇸🇬|🇬🇧|🇩🇪)\s*>

;==============================
; 节点名称清理
;==============================

rename_node=(VIP|官网|节点|高速|线路|专线|流媒体|解锁)@

;==============================
; 国家识别
;==============================

rename_node=香港|Hong Kong|HK@🇭🇰 HK

rename_node=台湾|Taiwan|TW@🇹🇼 TW

rename_node=日本|Japan|JP|Tokyo|Osaka@🇯🇵 JP

rename_node=新加坡|Singapore|SG@🇸🇬 SG

rename_node=韩国|Korea|KR|Seoul|Busan|Chuncheon|首尔|釜山|春川@🇰🇷 KR

rename_node=美国|USA|US|United States|Los Angeles|LA|Phoenix|San Jose|San Francisco|Seattle|Chicago|Dallas|New York@🇺🇸 US

rename_node=英国|UK|United Kingdom|London@🇬🇧 UK

rename_node=德国|Germany|DE|Frankfurt@🇩🇪 DE

[custom]
;极简版：规则源替换为 MetaCubeX/meta-rules-dat
;仅保留：节点选择、全球直连、全球拦截、漏网之鱼

; --- 拦截规则 (🛑 全球拦截) ---
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.list
ruleset=🛑 全球拦截,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/privacy.list

; --- 代理规则 (🚀 节点选择) ---
; 包含 Google, Telegram, YouTube, Netflix, OpenAI 及其他国外常用分流
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.list

; --- 直连规则 (🎯 全球直连) ---
; 包含 局域网, 苹果, 微软, 中国主流域名及IP
ruleset=🎯 全球直连,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/microsoft.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.list
ruleset=🎯 全球直连,[]GEOIP,CN

; --- 兜底规则 ---
ruleset=🐟 漏网之鱼,[]FINAL

; --- 策略组设置 ---
; 1. 节点选择：手动选择您的代理节点
custom_proxy_group=🚀 节点选择`select`.*

; 2. 全球直连：默认直接连接，也可手动切换到代理节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择

; 3. 全球拦截：默认广告拦截
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT

; 4. 漏网之鱼：处理规则之外的剩余流量
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连

enable_rule_generator=true
overwrite_original_rules=true
